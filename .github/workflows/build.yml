name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate packages
        run: |
          errors=0
          for dir in */; do
            for pkg in "$dir"*/; do
              if [ -d "$pkg" ]; then
                name=$(basename "$pkg")
                if [ ! -f "$pkg/version" ]; then
                  echo "ERROR: $name missing version file"
                  errors=$((errors+1))
                fi
              fi
            done
          done
          echo "Errors: $errors"
          exit $errors

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cat: core
            pkg: sed
          - cat: core
            pkg: grep
          - cat: core
            pkg: gawk
          - cat: core
            pkg: file
          - cat: core
            pkg: diffutils
          - cat: core
            pkg: findutils
          - cat: core
            pkg: patch
          - cat: core
            pkg: zlib
          - cat: core
            pkg: openssl
          - cat: network
            pkg: curl
          - cat: dev
            pkg: git
          - cat: dev
            pkg: supm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build swell-build
        run: |
          git clone --depth 1 https://github.com/SwellOS/swell-build.git /tmp/swell-build
          cd /tmp/swell-build
          cargo build --release
      - name: Setup workspace
        run: |
          sudo mkdir -p /usr/src/swell/packages /usr/src/swell/repo /usr/src/swell/build /usr/src/swell/sources /usr/src/swell/dest
          sudo cp -r ${{ github.workspace }}/* /usr/src/swell/packages/
          sudo chown -R $(whoami) /usr/src/swell
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential autoconf automake libtool pkg-config \
            libssl-dev zlib1g-dev libcurl4-openssl-dev libexpat1-dev
      - name: Build ${{ matrix.cat }}/${{ matrix.pkg }}
        run: |
          cd /tmp/swell-build
          ./target/release/swell-build pkg ${{ matrix.cat }}/${{ matrix.pkg }}
        env:
          SWELL_PACKAGES: /usr/src/swell/packages
          SWELL_REPO: /usr/src/swell/repo
          SWELL_BUILD: /usr/src/swell/build
          SWELL_SOURCES: /usr/src/swell/sources
          SWELL_DEST: /usr/src/swell/dest
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cat }}-${{ matrix.pkg }}
          path: /usr/src/swell/repo/packages/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
      - name: Generate repo.db
        run: |
          mkdir -p /tmp/repo
          python3 << 'PYEOF'
          import json, hashlib, os, shutil, subprocess
          packages = {}
          for root, dirs, files in os.walk('/tmp/artifacts'):
              for fname in files:
                  if not fname.endswith('.swell'):
                      continue
                  path = os.path.join(root, fname)
                  shutil.copy2(path, '/tmp/repo/')
                  result = subprocess.run(
                      ['tar', '--zstd', '-xf', path, '--to-stdout', 'metadata.toml'],
                      capture_output=True, text=True)
                  meta = {}
                  for line in result.stdout.splitlines():
                      line = line.strip()
                      if '=' in line:
                          k, v = line.split('=', 1)
                          meta[k.strip()] = v.strip().strip('"')
                  name = meta.get('name', fname)
                  version = meta.get('version', '0')
                  release = int(meta.get('release', '1'))
                  depends_str = meta.get('depends', '[]')
                  depends = json.loads(depends_str) if depends_str else []
                  packages[name] = {
                      'version': version,
                      'release': release,
                      'depends': depends,
                      'size': os.path.getsize(path),
                      'sha256': hashlib.sha256(open(path, 'rb').read()).hexdigest(),
                      'url': 'https://raw.githubusercontent.com/SwellOS/packages/gh-pages/' + fname,
                  }
          with open('/tmp/repo/repo.db', 'w') as f:
              json.dump(packages, f, indent=2)
              f.write('\n')
          print(f'Generated repo.db with {len(packages)} packages')
          for n, p in sorted(packages.items()):
              print(f'  {n} {p["version"]}-{p["release"]} ({p["size"]} bytes)')
          PYEOF
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/repo
          destination_dir: .
          keep_files: false
