name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check package structure
        run: |
          errors=0
          for dir in */; do
            for pkg in "$dir"*/; do
              if [ -d "$pkg" ]; then
                name=$(basename "$pkg")
                if [ ! -f "$pkg/version" ]; then
                  echo "ERROR: $name missing version file"
                  errors=$((errors+1))
                fi
                if [ ! -f "$pkg/depends" ]; then
                  echo "WARNING: $name missing depends file (empty is fine)"
                fi
              fi
            done
          done
          echo "Errors: $errors"
          exit $errors
