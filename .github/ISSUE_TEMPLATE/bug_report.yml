name: Package Bug Report
description: Report a bug in a package build script
labels: [bug]
body:
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package has the issue?
      placeholder: e.g. core/glibc
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version from the version file
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong during the build?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Build logs
      description: Paste relevant build output
      render: shell
  - type: textarea
    id: system
    attributes:
      label: Build environment
      description: Host OS, toolchain versions, kernel
