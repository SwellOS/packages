name: Package Request
description: Request a new package or package version bump
labels: [enhancement]
body:
  - type: input
    id: package
    attributes:
      label: Package name
      description: Name of the package to add or update
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Requested version
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is this package needed?
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Upstream URL
      description: Project homepage or source tarball URL
  - type: textarea
    id: depends
    attributes:
      label: Dependencies
      description: Known build-time and run-time dependencies
